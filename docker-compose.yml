services:
  postgres:
    image: postgres:17
    container_name: digidocs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-digidocs_mgt}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-go:
    build:
      context: ./backend-go
    container_name: digidocs-backend-go
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-DigiDocs Mgt Go API}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      APP_ENV: ${APP_ENV:-development}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATA_BACKEND: ${DATA_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/digidocs_mgt?sslmode=disable}
      WORKER_CALLBACK_TOKEN: ${WORKER_CALLBACK_TOKEN:-replace-me}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-memory}
      SYNOLOGY_HOST: ${SYNOLOGY_HOST:-}
      SYNOLOGY_PORT: ${SYNOLOGY_PORT:-5000}
      SYNOLOGY_HTTPS: ${SYNOLOGY_HTTPS:-false}
      SYNOLOGY_INSECURE_SKIP_VERIFY: ${SYNOLOGY_INSECURE_SKIP_VERIFY:-false}
      SYNOLOGY_ACCOUNT: ${SYNOLOGY_ACCOUNT:-}
      SYNOLOGY_PASSWORD: ${SYNOLOGY_PASSWORD:-}
      SYNOLOGY_SHARE_PATH: ${SYNOLOGY_SHARE_PATH:-/DigiDocs}
    ports:
      - "${BACKEND_GO_PORT:-18081}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    profiles:
      - app

  backend-py-worker:
    build:
      context: ./backend-py-worker
    container_name: digidocs-backend-py-worker
    restart: unless-stopped
    environment:
      WORKER_NAME: ${WORKER_NAME:-digidocs-py-worker}
      WORKER_MODE: ${WORKER_MODE:-local}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://host.docker.internal:18789}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-replace-me}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-openclaw/default}
      OPENCLAW_BACKEND_MODEL: ${OPENCLAW_BACKEND_MODEL:-}
      OPENCLAW_TIMEOUT_SECONDS: ${OPENCLAW_TIMEOUT_SECONDS:-60}
      CALLBACK_BASE_URL: ${CALLBACK_BASE_URL:-http://backend-go:8080}
      CALLBACK_TOKEN: ${CALLBACK_TOKEN:-replace-me}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend-go
    profiles:
      - app

  frontend:
    build:
      context: ./frontend
    container_name: digidocs-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      - backend-go
    profiles:
      - app

volumes:
  postgres_data:
