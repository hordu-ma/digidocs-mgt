services:
  postgres:
    image: postgres:17
    container_name: digidocs-postgres
    environment:
      POSTGRES_DB: digidocs_mgt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: digidocs-redis
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:latest
    container_name: digidocs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
