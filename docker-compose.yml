services:
  postgres:
    image: postgres:17
    container_name: digidocs-postgres
    environment:
      POSTGRES_DB: digidocs_mgt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-go:
    build:
      context: ./backend-go
    container_name: digidocs-backend-go
    environment:
      APP_NAME: DigiDocs Mgt Go API
      HTTP_ADDR: :8080
      APP_ENV: development
      API_V1_PREFIX: /api/v1
      DATA_BACKEND: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/digidocs_mgt?sslmode=disable
      WORKER_CALLBACK_TOKEN: replace-me
      JWT_SECRET: dev-secret
      STORAGE_BACKEND: ${STORAGE_BACKEND:-memory}
      SYNOLOGY_HOST: ${SYNOLOGY_HOST:-}
      SYNOLOGY_PORT: ${SYNOLOGY_PORT:-5000}
      SYNOLOGY_HTTPS: ${SYNOLOGY_HTTPS:-false}
      SYNOLOGY_ACCOUNT: ${SYNOLOGY_ACCOUNT:-}
      SYNOLOGY_PASSWORD: ${SYNOLOGY_PASSWORD:-}
      SYNOLOGY_SHARE_PATH: ${SYNOLOGY_SHARE_PATH:-/DigiDocs}
    ports:
      - "18081:8080"
    depends_on:
      - postgres
    profiles:
      - app

  backend-py-worker:
    build:
      context: ./backend-py-worker
    container_name: digidocs-backend-py-worker
    environment:
      WORKER_NAME: digidocs-py-worker
      WORKER_MODE: local
      OPENCLAW_BASE_URL: http://openclaw:8000
      OPENCLAW_API_KEY: replace-me
      CALLBACK_BASE_URL: http://backend-go:8080
      CALLBACK_TOKEN: replace-me
    depends_on:
      - backend-go
    profiles:
      - app

volumes:
  postgres_data:
