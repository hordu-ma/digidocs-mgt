server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend-go:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Real static assets: only serve files that actually exist.
    location = /index.html {
        try_files /index.html =404;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        try_files /favicon.ico =404;
    }

    location ^~ /assets/ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA entry routes: serve the shell directly without probing arbitrary
    # request paths on disk, which avoids negative dentry growth from scans.
    location = / {
        try_files /index.html =404;
    }
    location = /login {
        try_files /index.html =404;
    }
    location = /dashboard {
        try_files /index.html =404;
    }
    location = /documents {
        try_files /index.html =404;
    }
    location ~ ^/documents/[^/]+$ {
        try_files /index.html =404;
    }
    location = /data {
        try_files /index.html =404;
    }
    location = /code {
        try_files /index.html =404;
    }
    location = /handovers {
        try_files /index.html =404;
    }
    location = /assistant {
        try_files /index.html =404;
    }
    location = /admin {
        try_files /index.html =404;
    }
    location = /profile {
        try_files /index.html =404;
    }

    # Unknown paths should fail fast instead of falling back to the SPA shell.
    location / {
        return 404;
    }
}
