<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DigiDocs Mgt system architecture</title>
  <desc id="desc">Architecture showing DigiDocs Mgt on DGX Spark connected to Synology DS925 Plus for storage and database, with OpenClaw for AI assistance.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#4b5563"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #1e293b; }
      .label { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .note { font: 600 15px Arial, sans-serif; fill: #0f172a; }
      .frame { stroke: #cbd5e1; stroke-width: 2; }
      .box { stroke: #94a3b8; stroke-width: 2; }
      .line { stroke: #4b5563; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="46" text-anchor="middle" class="title">DigiDocs Mgt Solution Architecture</text>
  <text x="600" y="76" text-anchor="middle" class="small">DGX Spark runs the app and AI workflow. Synology DS925+ provides the storage and database foundation.</text>

  <rect x="445" y="110" rx="16" ry="16" width="310" height="92" fill="#dbeafe" class="frame"/>
  <text x="600" y="148" text-anchor="middle" class="subtitle">User Browser</text>
  <text x="600" y="174" text-anchor="middle" class="small">PI / project lead / team member</text>

  <rect x="70" y="245" rx="22" ry="22" width="520" height="410" fill="#eff6ff" class="frame"/>
  <text x="100" y="286" class="subtitle">NVIDIA DGX Spark</text>
  <text x="100" y="312" class="small">Application layer and AI processing</text>

  <rect x="112" y="340" rx="16" ry="16" width="180" height="92" fill="#ffffff" class="box"/>
  <text x="202" y="375" text-anchor="middle" class="label">Web Frontend</text>
  <text x="202" y="400" text-anchor="middle" class="small">Vue / dashboard / forms</text>

  <rect x="330" y="340" rx="16" ry="16" width="220" height="92" fill="#ffffff" class="box"/>
  <text x="440" y="375" text-anchor="middle" class="label">Go API Service</text>
  <text x="440" y="400" text-anchor="middle" class="small">auth / workflow / audit</text>

  <rect x="112" y="476" rx="16" ry="16" width="180" height="92" fill="#ffffff" class="box"/>
  <text x="202" y="511" text-anchor="middle" class="label">Python Worker</text>
  <text x="202" y="536" text-anchor="middle" class="small">OCR / summarize / jobs</text>

  <rect x="330" y="476" rx="16" ry="16" width="220" height="92" fill="#ffffff" class="box"/>
  <text x="440" y="511" text-anchor="middle" class="label">OpenClaw Gateway</text>
  <text x="440" y="536" text-anchor="middle" class="small">AI chat / summary / suggestion</text>

  <rect x="112" y="596" rx="16" ry="16" width="438" height="34" fill="#dbeafe" class="box"/>
  <text x="331" y="619" text-anchor="middle" class="note">AI suggestions stay separate from official business state.</text>

  <rect x="660" y="245" rx="22" ry="22" width="470" height="410" fill="#f0fdf4" class="frame"/>
  <text x="690" y="286" class="subtitle">Synology DS925+</text>
  <text x="690" y="312" class="small">File and data foundation</text>

  <rect x="710" y="340" rx="16" ry="16" width="170" height="98" fill="#ffffff" class="box"/>
  <text x="795" y="375" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="795" y="400" text-anchor="middle" class="small">metadata / audit / state</text>

  <rect x="910" y="340" rx="16" ry="16" width="170" height="98" fill="#ffffff" class="box"/>
  <text x="995" y="375" text-anchor="middle" class="label">DSM / File Station</text>
  <text x="995" y="400" text-anchor="middle" class="small">document storage</text>

  <rect x="710" y="476" rx="16" ry="16" width="370" height="92" fill="#ffffff" class="box"/>
  <text x="895" y="511" text-anchor="middle" class="label">Retention and handover foundation</text>
  <text x="895" y="536" text-anchor="middle" class="small">team assets remain with the lab, not with personal laptops</text>

  <line x1="600" y1="202" x2="202" y2="340" class="line"/>
  <line x1="202" y1="432" x2="330" y2="386" class="line"/>
  <line x1="440" y1="432" x2="440" y2="476" class="line"/>
  <line x1="292" y1="522" x2="330" y2="522" class="line"/>
  <line x1="550" y1="386" x2="710" y2="386" class="line"/>
  <line x1="550" y1="420" x2="910" y2="420" class="line"/>
  <path d="M 550 522 C 650 522, 650 522, 710 522" class="line"/>
  <path d="M 795 438 C 795 460, 795 470, 795 476" class="line dash"/>

  <text x="253" y="300" class="small">HTTPS</text>
  <text x="575" y="376" class="small">REST API</text>
  <text x="578" y="414" class="small">file upload / download</text>
  <text x="582" y="512" class="small">async jobs / callback</text>
</svg>
